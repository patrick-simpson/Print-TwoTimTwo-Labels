<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 220px; font-family: system-ui, sans-serif; padding: 12px; margin: 0; background: #f8fafc; }
    h3 { margin: 0 0 4px 0; font-size: 14px; color: #1e293b; }
    .version { font-size: 10px; color: #94a3b8; margin-bottom: 12px; }
    .status-card { background: white; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; margin-bottom: 12px; }
    .status-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; }
    .dot.online { background: #22c55e; box-shadow: 0 0 4px #22c55e; }
    .dot.offline { background: #ef4444; }
    .btn { display: block; width: 100%; text-align: center; padding: 8px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px; font-size: 12px; margin-top: 8px; cursor: pointer; border: none; }
    .btn:hover { background: #1d4ed8; }
    .btn-secondary { background: #64748b; }
    .footer { font-size: 10px; color: #64748b; margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <h3>KVBC Check-in</h3>
  <div class="version">Extension v2.0.3</div>
  
  <div class="status-card">
    <div class="status-item">
      <div id="status-dot" class="dot"></div>
      <span id="status-text">Checking server...</span>
    </div>
  </div>

  <button id="check-btn" class="btn">Refresh Status</button>
  <a href="https://github.com/patrick-simpson/Print-TwoTimTwo-Labels/releases/latest" target="_blank" class="btn btn-secondary">Download Installer</a>
  
  <div class="footer">KVBC Kids Ministry</div>
  <script src="popup.js"></script>
</body>
</html>
