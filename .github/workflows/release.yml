name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(cat VERSION)
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi
          node scripts/check-versions.cjs

      - name: Package print server
        run: |
          VERSION=$(cat VERSION)
          mkdir -p dist
          cd server
          zip -r ../dist/awana-print-server-${VERSION}.zip \
            server.js \
            src/ \
            package.json \
            start.bat \
            config.json.example \
            clubbers-template.csv \
            public/
          cd ..

      - name: Package browser extension
        run: |
          VERSION=$(cat VERSION)
          cd extension
          zip -r ../dist/awana-checkin-extension-${VERSION}.zip \
            manifest.json \
            background.js \
            content.js \
            popup.html \
            popup.js \
            icon128.png \
            README.md \
            PRIVACY.md
          cd ..

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/awana-print-server-*.zip
            dist/awana-checkin-extension-*.zip
          generate_release_notes: true
