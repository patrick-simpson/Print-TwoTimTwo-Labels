name: Build Electron App

# Normally triggered by a `vX.Y.Z` tag push. To cut a release, don't create
# that tag by hand — dispatch `create-release-tag.yml` instead (Actions tab,
# or see "Releasing the Windows app" in CLAUDE.md). It pushes the tag with
# its own token and this workflow picks it up automatically.
on:
  push:
    tags:
      - 'v*'            # triggers on version tags like v1.0.0
  workflow_dispatch:    # manual trigger (build/smoke-test only — no tag ref, so the release job is skipped)

permissions:
  contents: write       # needed to attach installer + update feed to Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # The full print server ships inside the installer via extraResources,
      # INCLUDING its node_modules — without this install step the packaged
      # app has no server dependencies at all. @napi-rs/canvas ships prebuilt
      # N-API binaries, so this needs no build toolchain and the same modules
      # load in both plain Node and Electron.
      - name: Install print-server dependencies
        run: npm ci --omit=dev
        working-directory: print-server

      - name: Render smoke test (label pipeline works headless)
        run: node scripts/render-smoke.cjs render-smoke-out

      - name: Upload rendered label samples
        uses: actions/upload-artifact@v4
        with:
          name: label-render-samples
          path: render-smoke-out/*.png
          if-no-files-found: error

      - name: Install electron-app dependencies
        run: npm ci
        working-directory: electron-app

      # Build only — publishing happens in the release job AFTER the installed
      # exe passes the smoke test, so a broken build can never reach users.
      - name: Build installer
        run: npm run dist
        working-directory: electron-app

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Awana-Label-Printer-Setup
          path: |
            electron-app/dist/*.exe
            electron-app/dist/*.blockmap
            electron-app/dist/latest.yml
          if-no-files-found: error

  smoke-test:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: Awana-Label-Printer-Setup
          path: installer

      - name: Install silently
        shell: pwsh
        run: |
          $exe = Get-ChildItem installer -Filter *.exe | Select-Object -First 1
          $proc = Start-Process -FilePath $exe.FullName -ArgumentList '/S' -PassThru -Wait
          Write-Host "Installer process exit code: $($proc.ExitCode)"

          # electron-builder's one-click NSIS installer is a self-extracting
          # stub that can hand off the real file copy to a detached child and
          # return before that child finishes — a single Test-Path right after
          # -Wait returns is a race (reproduced on two different runners).
          # Poll for the app instead of assuming the exact path.
          $deadline = (Get-Date).AddSeconds(60)
          $installed = $null
          while ((Get-Date) -lt $deadline) {
            $found = Get-ChildItem "$env:LOCALAPPDATA\Programs" -Filter 'Awana Label Printer.exe' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $installed = $found.FullName; break }
            Start-Sleep -Seconds 3
          }

          if (-not $installed) {
            Write-Host "---- Diagnostics: $env:LOCALAPPDATA\Programs ----"
            Get-ChildItem "$env:LOCALAPPDATA\Programs" -Recurse -ErrorAction SilentlyContinue |
              Select-Object FullName | Format-Table -AutoSize | Out-String | Write-Host
            Write-Host "---- Diagnostics: uninstall registry entries ----"
            Get-ItemProperty 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*' -ErrorAction SilentlyContinue |
              Where-Object { $_.DisplayName -like '*Awana*' } | Format-List | Out-String | Write-Host
            throw "App exe never appeared under `$env:LOCALAPPDATA\Programs after 60s (installer exit code: $($proc.ExitCode))"
          }

          Write-Host "Installed app found at: $installed"
          "INSTALLED_EXE=$installed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # Pre-seed config so the app starts the server instead of waiting in the
      # first-run wizard. launchOnBoot off so the runner image stays clean.
      #
      # --user-data-dir pins Electron's userData folder explicitly instead of
      # guessing where app.getPath('userData') lands: the install step above
      # just proved the install directory uses package.json's "name" field
      # (awana-label-printer), not "productName" (Awana Label Printer) as
      # assumed — guessing the config/userData path the same way is the same
      # class of bug. --user-data-dir is a native Electron/Chromium switch
      # that app.getPath('userData') honors automatically, so this sidesteps
      # the guess entirely. Stdout/stderr are captured so a future failure is
      # diagnosable from logs instead of another blind guess.
      - name: Seed config and launch
        shell: pwsh
        run: |
          $ciDataDir = "$env:RUNNER_TEMP\awana-userdata"
          New-Item -ItemType Directory -Force -Path $ciDataDir | Out-Null
          @{ printerName = 'Microsoft Print to PDF'; checkinUrl = 'https://example.com/'; launchOnBoot = $false } |
            ConvertTo-Json | Set-Content "$ciDataDir\config.json"
          "CI_DATA_DIR=$ciDataDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $launchTime = Get-Date
          "APP_LAUNCH_TIME=$($launchTime.ToString('o'))" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $proc = Start-Process "$env:INSTALLED_EXE" `
            -ArgumentList "--auto-start", "--user-data-dir=$ciDataDir" `
            -RedirectStandardOutput "$ciDataDir\stdout.log" `
            -RedirectStandardError "$ciDataDir\stderr.log" `
            -PassThru
          "APP_PID=$($proc.Id)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Launched PID $($proc.Id)"

      - name: Verify FULL server is up and serving
        shell: pwsh
        run: |
          # Sample the process's liveness on every poll instead of only
          # checking once at the end — a v5.0.2 run showed the server start
          # and bind the port successfully, then the process was gone by the
          # time of a single end-of-window check, with no way to tell when or
          # why it died. This pinpoints the moment instead of guessing.
          $deadline = (Get-Date).AddSeconds(90)
          $health = $null
          $diedAt = $null
          while ((Get-Date) -lt $deadline) {
            $alive = Get-Process -Id $env:APP_PID -ErrorAction SilentlyContinue
            if (-not $alive -and -not $diedAt) {
              $diedAt = Get-Date
              $elapsed = [math]::Round(($diedAt - [datetime]$env:APP_LAUNCH_TIME).TotalSeconds, 1)
              Write-Host "!! App process (PID $env:APP_PID) is no longer running — died ~${elapsed}s after launch"
            }
            try { $health = Invoke-RestMethod http://localhost:3456/health -TimeoutSec 3; break } catch { Start-Sleep 2 }
          }
          if (-not $health) {
            Write-Host "---- Diagnostics: app stdout ----"
            Get-Content "$env:CI_DATA_DIR\stdout.log" -ErrorAction SilentlyContinue | Write-Host
            Write-Host "---- Diagnostics: app stderr ----"
            Get-Content "$env:CI_DATA_DIR\stderr.log" -ErrorAction SilentlyContinue | Write-Host
            Write-Host "---- Diagnostics: process liveness ----"
            if ($diedAt) {
              Write-Host "Process died at $diedAt (~$([math]::Round(($diedAt - [datetime]$env:APP_LAUNCH_TIME).TotalSeconds,1))s after launch); no /health response before or after."
            } else {
              Write-Host "Process (PID $env:APP_PID) was still running at timeout — server bound but never answered /health, or answered on a different interface."
              Get-Process -Id $env:APP_PID -ErrorAction SilentlyContinue | Format-List | Out-String | Write-Host
            }
            Write-Host "---- Diagnostics: is anything listening on port 3456? ----"
            Get-NetTCPConnection -LocalPort 3456 -ErrorAction SilentlyContinue | Format-Table -AutoSize | Out-String | Write-Host
            Write-Host "---- Diagnostics: Windows Application event log (crash reports) ----"
            Get-WinEvent -FilterHashtable @{ LogName = 'Application'; StartTime = [datetime]$env:APP_LAUNCH_TIME } -ErrorAction SilentlyContinue |
              Where-Object { $_.Message -like '*Awana*' -or $_.ProviderName -like '*Application Error*' } |
              Select-Object TimeCreated, Id, ProviderName, @{n='Message';e={$_.Message.Substring(0, [Math]::Min(500, $_.Message.Length))}} |
              Format-List | Out-String | Write-Host
            throw 'Server never answered /health'
          }
          Write-Host "Health: $($health | ConvertTo-Json -Compress)"
          if ($health.status -ne 'ok') { throw "Unexpected health status: $($health.status)" }

          # Version must match the tag being released (guards a stale build)
          if ("$env:GITHUB_REF" -like 'refs/tags/v*') {
            $expected = "$env:GITHUB_REF_NAME".TrimStart('v')
            if ($health.version -ne $expected) { throw "Version mismatch: server=$($health.version) tag=$expected" }
          }

          # /preview only exists on the FULL server — this is the check that
          # the packaged server (and its canvas renderer) actually loaded
          # instead of anything degraded. It must return a real PNG.
          $png = Invoke-WebRequest 'http://localhost:3456/preview?firstName=Smoke&lastName=Test' -TimeoutSec 15
          if ($png.StatusCode -ne 200) { throw "/preview returned $($png.StatusCode)" }
          $bytes = $png.Content
          if ($bytes[0] -ne 0x89 -or $bytes[1] -ne 0x50) { throw '/preview did not return a PNG — full server render path broken' }
          Write-Host "Preview PNG: $($bytes.Length) bytes"

      - name: Stop app
        if: always()
        shell: pwsh
        run: Get-Process 'Awana Label Printer' -ErrorAction SilentlyContinue | Stop-Process -Force

  release:
    # Publish only after the INSTALLED app passed the smoke test.
    needs: smoke-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: Awana-Label-Printer-Setup
          path: installer

      # latest.yml + blockmap are the electron-updater feed — without them
      # installed apps can never see this release.
      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            installer/*.exe
            installer/*.blockmap
            installer/latest.yml
