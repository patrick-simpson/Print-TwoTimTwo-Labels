name: Create Release Tag

# Lets a release be cut without needing local/session git tag-push access:
# a Claude Code session's git remote is commonly scoped to branch pushes
# only (tag pushes rejected), and manual web-UI tagging has repeatedly hit
# footguns here (tag case-sensitivity, republishing without deleting the
# underlying tag first). This workflow's own GITHUB_TOKEN can push tags
# regardless of that. It never builds anything itself — it creates the tag,
# then explicitly dispatches build-electron.yml against that tag.
#
# That explicit dispatch is required, not cosmetic: GitHub's anti-recursion
# rule means a push made BY THE DEFAULT GITHUB_TOKEN does NOT fire other
# workflows' `push` triggers (only workflow_dispatch/repository_dispatch are
# exempted) — confirmed the hard way when v5.0.2's tag push silently didn't
# start a build. Dispatching build-electron.yml with `ref: vX.Y.Z` produces
# an identical run to a native tag push (github.ref resolves to
# refs/tags/vX.Y.Z inside it, so the release job's tag-only guard still
# works), it just has to be done explicitly rather than relying on the push.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 5.0.2 (no leading "v" — added automatically)'
        required: true
      ref:
        description: 'Branch or commit to tag'
        required: false
        default: 'main'

permissions:
  contents: write
  actions: write   # needed to dispatch build-electron.yml below

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Validate version and create tag
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be X.Y.Z with no leading 'v' (got: '$VERSION')"
            exit 1
          fi
          TAG="v$VERSION"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists — bump to a new version instead of reusing one"
            exit 1
          fi
          # Guard against releasing a build that doesn't match its own version
          # bump (VERSION is the single source of truth, kept in sync by
          # scripts/bump-version.cjs across the repo).
          REPO_VERSION="$(cat VERSION | tr -d '[:space:]')"
          if [ "$REPO_VERSION" != "$VERSION" ]; then
            echo "::error::VERSION file says $REPO_VERSION but you asked to release $VERSION — run scripts/bump-version.cjs first"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "TAG=$TAG" >> "$GITHUB_ENV"

      - name: Dispatch the build workflow for this tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run build-electron.yml --repo "${{ github.repository }}" --ref "$TAG"
          echo "### Created tag \`$TAG\` and dispatched \`Build Electron App\` for it" >> "$GITHUB_STEP_SUMMARY"
